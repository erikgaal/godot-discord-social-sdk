name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# The Discord Social SDK is gated behind the Developer Portal and cannot be
# committed or fetched anonymously. Provide a direct download URL to a zipped
# SDK (containing the `discord_social_sdk/` folder) as the repository secret
# DISCORD_SDK_URL. Jobs skip the native build if the secret is absent.
env:
  GODOT_VERSION: "4.4.1"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    env:
      DISCORD_SDK_URL: ${{ secrets.DISCORD_SDK_URL }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-22.04
            platform: linux
            arch: x86_64
          - name: macos-universal
            runner: macos-14
            platform: macos
            arch: universal
          - name: windows-x86_64
            runner: windows-2022
            platform: windows
            arch: x86_64
          - name: windows-arm64
            runner: windows-2022
            platform: windows
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      - name: Fetch Discord Social SDK
        if: ${{ env.DISCORD_SDK_URL != '' }}
        shell: bash
        run: |
          curl -L "$DISCORD_SDK_URL" -o sdk.zip
          mkdir -p _sdk && unzip -q sdk.zip -d _sdk
          # Locate the folder that directly contains include/discordpp.h.
          HEADER=$(find _sdk -name discordpp.h -path '*/include/*' | head -1)
          SDK_DIR=$(dirname "$(dirname "$HEADER")")
          python scripts/setup_sdk.py "$SDK_DIR"

      - name: Build (debug + release)
        if: ${{ env.DISCORD_SDK_URL != '' }}
        run: |
          scons platform=${{ matrix.platform }} arch=${{ matrix.arch }} target=template_debug
          scons platform=${{ matrix.platform }} arch=${{ matrix.arch }} target=template_release

      - name: Upload extension binaries
        if: ${{ env.DISCORD_SDK_URL != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.name }}
          path: demo/addons/discord_social_sdk/bin/

  test:
    name: Headless tests (linux)
    needs: build
    runs-on: ubuntu-22.04
    env:
      DISCORD_SDK_URL: ${{ secrets.DISCORD_SDK_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Check SDK secret
        id: gate
        run: echo "enabled=${{ env.DISCORD_SDK_URL != '' }}" >> "$GITHUB_OUTPUT"

      - name: Download linux binaries
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: bin-linux-x86_64
          path: demo/addons/discord_social_sdk/bin/

      - name: Install Godot ${{ env.GODOT_VERSION }}
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        run: |
          curl -L -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip
          mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 godot
          chmod +x godot

      - name: Import project
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        run: ./godot --headless --path demo --import || true

      - name: Run tests
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        run: ./godot --headless --path demo --script res://tests/run_tests.gd
