# Reusable workflow: build the extension for one platform/arch and upload the
# compiled binaries as an artifact. Called by ci.yml and release.yml.
#
# The Discord Social SDK is gated behind the Developer Portal, so it cannot be
# fetched anonymously. Set the repository secret DISCORD_SDK_URL to a direct
# download URL for a zipped SDK (the archive must contain a
# `discord_social_sdk/` folder with include/discordpp.h). When the secret is
# absent the build steps are skipped — expected on fork PRs.
name: build (reusable)

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      platform:
        required: true
        type: string
      arch:
        required: true
        type: string
      name:
        required: true
        type: string
      sdk_url:
        description: "Ephemeral Discord Social SDK download URL (overrides the secret)"
        required: false
        type: string
        default: ""

jobs:
  build:
    name: ${{ inputs.name }}
    runs-on: ${{ inputs.runner }}
    env:
      # Prefer the per-run URL passed at dispatch; fall back to a stored secret.
      DISCORD_SDK_URL: ${{ inputs.sdk_url != '' && inputs.sdk_url || secrets.DISCORD_SDK_URL }}
    steps:
      - name: Notice when no SDK URL is available
        if: ${{ env.DISCORD_SDK_URL == '' }}
        run: |
          echo "::warning::No Discord Social SDK URL — skipping native build."
          echo "Dispatch this workflow with an 'sdk_url' input, or set a DISCORD_SDK_URL secret."

      - uses: actions/checkout@v4
        if: ${{ env.DISCORD_SDK_URL != '' }}
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        if: ${{ env.DISCORD_SDK_URL != '' }}
        with:
          python-version: "3.x"

      - name: Install SCons
        if: ${{ env.DISCORD_SDK_URL != '' }}
        run: pip install scons

      - name: Fetch Discord Social SDK
        if: ${{ env.DISCORD_SDK_URL != '' }}
        run: python scripts/fetch_sdk.py "$DISCORD_SDK_URL"
        shell: bash

      - name: Build (debug + release)
        if: ${{ env.DISCORD_SDK_URL != '' }}
        run: |
          scons platform=${{ inputs.platform }} arch=${{ inputs.arch }} target=template_debug
          scons platform=${{ inputs.platform }} arch=${{ inputs.arch }} target=template_release
        shell: bash

      - name: Upload extension binaries
        if: ${{ env.DISCORD_SDK_URL != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ inputs.name }}
          if-no-files-found: error
          # Only our binaries — never Discord's runtime libraries.
          path: demo/addons/discord_social_sdk/bin/libdiscord_social_sdk.*
