name: Release

# Cut a release by running this workflow manually (Actions → Release → Run
# workflow) with a version and a fresh SDK download URL. It builds every
# platform, packages the addon (our binaries only — Discord's runtime libs are
# not redistributed), tags the commit, and attaches the zip to a draft Release.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.1.0)"
        required: true
        type: string
      sdk_url:
        description: "Discord Social SDK download URL (from the Developer Portal; expires ~1h)"
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x86_64, runner: ubuntu-22.04, platform: linux, arch: x86_64 }
          - { name: macos-universal, runner: macos-14, platform: macos, arch: universal }
          - { name: windows-x86_64, runner: windows-2022, platform: windows, arch: x86_64 }
          - { name: windows-arm64, runner: windows-2022, platform: windows, arch: arm64 }
    uses: ./.github/workflows/_build.yml
    with:
      runner: ${{ matrix.runner }}
      platform: ${{ matrix.platform }}
      arch: ${{ matrix.arch }}
      name: ${{ matrix.name }}
      sdk_url: ${{ inputs.sdk_url || '' }}
    secrets: inherit

  package:
    name: Package & release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package addon
        run: python scripts/package_addon.py --version "${{ inputs.version }}" --bin artifacts

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            "dist/discord_social_sdk-${{ inputs.version }}.zip" \
            --title "v${{ inputs.version }}" \
            --target "${GITHUB_SHA}" \
            --notes "Godot addon binaries for the Discord Social SDK.

          **Install:** unzip into your project's \`res://addons/\`, then add the Discord Social SDK runtime libraries (\`libdiscord_partner_sdk.*\` / \`discord_partner_sdk.dll\`) to \`addons/discord_social_sdk/bin/\` from your Discord Developer Portal download. See the addon README." \
            --draft
